<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeatRoom — Real-time Collaborative Music Sequencer</title>
  <meta name="description" content="Compose beats live with users around the world. A real-time collaborative step sequencer using Tone.js, Web Audio API, and Socket.io.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-color': '#08090f',
            'glass-bg': 'rgba(18, 20, 36, 0.65)',
            'glass-border': 'rgba(255, 255, 255, 0.05)',
            'text-primary': '#f8fafc',
            'text-secondary': '#94a3b8',
            'text-muted': '#64748b',
            'kick': '#ff5f7e',
            'snare': '#00f5ff',
            'hihat': '#bd57fa',
            'bass': '#ffb319',
            'synth': '#00ff87',
            'pad': '#8a9aec',
          },
          backgroundImage: {
            'bg-gradient': 'radial-gradient(circle at top left, #120e24, #08090f, #040817)',
          },
          boxShadow: {
            'glass-glow': '0 8px 32px 0 rgba(0, 0, 0, 0.5)',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Lobby Overlay (Room Picker & Username Selection) -->
  <div id="lobby-overlay" role="dialog" aria-labelledby="lobby-title">
    <div class="lobby-card">
      <h1 id="lobby-title" class="lobby-title">BEATROOM</h1>
      <p class="lobby-subtitle">Collaborative Browser Audio Production</p>
      
      <div class="input-group">
        <label for="username-input">Your Studio Handle</label>
        <input type="text" id="username-input" class="input-field" placeholder="e.g. Beatmaker_99" maxlength="20" autofocus>
      </div>

      <div class="input-group">
        <label for="room-input">Studio Room Name</label>
        <input type="text" id="room-input" class="input-field" placeholder="e.g. ambient-lounge" maxlength="20">
      </div>

      <div class="lobby-actions">
        <button id="join-btn" class="btn-primary">Enter Studio Room</button>
      </div>

      <h2 class="lobby-rooms-header">Active Rooms</h2>
      <div id="lobby-rooms-list" class="lobby-rooms-list">
        <div class="room-empty-msg">No active rooms. Create one above!</div>
      </div>
    </div>
  </div>

  <!-- Studio Workspace -->
  <div id="app-studio">
    <!-- Header -->
    <header class="studio-header">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true"></div>
        <span class="brand-title">BEATROOM</span>
      </div>

      <div class="session-info">
        <button id="theme-toggle-btn" class="p-2 rounded-full hover:bg-white/10 transition-colors text-[var(--text-secondary)] hover:text-[var(--text-primary)]" aria-label="Toggle Theme">
          <svg id="theme-icon-sun" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 4.22a1 1 0 011.415 0l.708.708a1 1 0 01-1.414 1.414l-.708-.708a1 1 0 010-1.414zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM14.929 15.636a1 1 0 010 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-4.22a1 1 0 010-1.414l-.708-.708a1 1 0 011.414-1.414l.708.708a1 1 0 01-1.414 1.414zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zM4.929 4.929a1 1 0 011.414 0l.707.707a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 010-1.414zM10 5a5 5 0 100 10 5 5 0 000-10z"/></svg>
          <svg id="theme-icon-moon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
        <div id="room-display-badge" class="room-badge">
          Studio: <span id="current-room-text">None</span>
        </div>
        <div id="latency-display-badge" class="latency-badge" title="Roundtrip time to server">
          <div id="latency-indicator-dot" class="latency-dot"></div>
          <span id="latency-text">0 ms ping</span>
        </div>
      </div>
    </header>

    <!-- Workspace centralized layout -->
    <main class="flex flex-col items-center justify-center flex-1 h-[calc(100vh-70px)] overflow-hidden w-full px-4">
      <!-- Center: Sequencer Grid -->
      <section class="w-full max-w-6xl flex flex-col gap-6 py-6 overflow-y-auto" aria-label="Sequencer Matrix">
        
        <!-- Recording Status Bar (Visible only when exporting/recording) -->
        <div id="recording-status-bar" class="recording-bar">
          <div class="recording-progress">
            <span class="record-dot"></span>
            <span style="font-weight: 600; color: #ef4444;">Live Session Recording</span>
            <span id="recording-duration" class="recording-timer">00:00</span>
          </div>
          <button id="wav-download-btn" class="btn-export-download" style="display: none;">
            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
              <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
            </svg>
            Download WAV
          </button>
        </div>

        <!-- Master Studio Bar (BPM, play controls) -->
        <div class="master-bar">
          <div class="master-playback">
            <button id="play-btn" class="btn-ctrl" aria-label="Play sequencer">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
              </svg>
            </button>
            <button id="pause-btn" class="btn-ctrl" aria-label="Pause sequencer">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M5.5 3.5A1.5 1.5 0 0 1 7 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5zm5 0A1.5 1.5 0 0 1 12 5v6a1.5 1.5 0 0 1-3 0V5a1.5 1.5 0 0 1 1.5-1.5z"/>
              </svg>
            </button>
            <button id="stop-btn" class="btn-ctrl" aria-label="Stop sequencer">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                <path d="M5 3h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>
              </svg>
            </button>
            <button id="record-btn" class="btn-ctrl btn-record" aria-label="Record session">
              <span class="record-dot"></span>
              <span>Record Studio Output</span>
            </button>
          </div>

          <div class="master-tempo">
            <div class="bpm-controls">
              <button id="tap-tempo-btn" class="btn-tap">Tap</button>
              <div class="bpm-input-wrapper">
                <input type="number" id="bpm-val-input" class="bpm-input" value="120" min="40" max="240">
                <span class="bpm-label">BPM</span>
              </div>
            </div>
            <input type="range" id="bpm-slider-input" class="bpm-slider" min="40" max="240" value="120">
          </div>
        </div>

        <!-- Sequencer Matrix Box -->
        <div class="grid-box" id="sequencer-grid-box">
          <!-- Column Headings -->
          <div class="grid-header">
            <div style="width: 220px;"></div>
            <div class="grid-markers">
              <div class="marker" data-step="0">1</div>
              <div class="marker" data-step="1">2</div>
              <div class="marker" data-step="2">3</div>
              <div class="marker" data-step="3">4</div>
              <div class="marker" data-step="4">5</div>
              <div class="marker" data-step="5">6</div>
              <div class="marker" data-step="6">7</div>
              <div class="marker" data-step="7">8</div>
              <div class="marker" data-step="8">9</div>
              <div class="marker" data-step="9">10</div>
              <div class="marker" data-step="10">11</div>
              <div class="marker" data-step="11">12</div>
              <div class="marker" data-step="12">13</div>
              <div class="marker" data-step="13">14</div>
              <div class="marker" data-step="14">15</div>
              <div class="marker" data-step="15">16</div>
            </div>
          </div>

          <!-- Live Playhead Overlay Indicator -->
          <div id="playhead-line" class="playhead-column-highlight" style="left: 220px; display: none;"></div>

          <!-- Sequencer Channels Rows (Generated by JS) -->
          <div id="sequencer-rows-container" style="display: flex; flex-direction: column; gap: 8px;">
            <!-- Rows will be injected by app.js -->
          </div>
        </div>
      </section>

      </section>
    </main>
  </div>

  <!-- Load dependencies (Socket.io Client and Tone.js v14) -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <!-- Programmatic Audio presets -->
  <script src="samples.js"></script>
  
  <!-- Studio Client logic -->
  <script src="app.js"></script>
</body>
</html>
